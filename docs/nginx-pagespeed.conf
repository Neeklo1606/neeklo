# Фрагмент для nginx: gzip + кеш статики (PageSpeed quick wins)
# Подключите в server { } или include в http { }.

# gzip
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_proxied any;
gzip_comp_level 5;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/json
  application/xml
  application/xml+rss
  image/svg+xml;

# Кеш статики (если отдаёте из nginx, а не через Laravel)
location ~* \.(js|mjs|css|woff2?|ttf|eot|png|jpe?g|gif|webp|avif|ico|svg)$ {
  expires 1y;
  add_header Cache-Control "public, max-age=31536000, immutable";
  add_header Vary "Accept-Encoding";
  try_files $uri $uri/ /index.php?$query_string;
}

# HTML SPA — не кешировать долго
location = / {
  add_header Cache-Control "public, max-age=0, must-revalidate";
}
